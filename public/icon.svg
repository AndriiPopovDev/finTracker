<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="income" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect width="510" height="510" rx="111" fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>
  
  <!-- Main chart circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#334155" stroke-width="2" opacity="0.3"/>
  
  <!-- Expense arc (rose) -->
  <path d="M 256 96 A 160 160 0 0 1 416 256" fill="none" stroke="#f43f5e" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Income arc (emerald) -->
  <path d="M 96 256 A 160 160 0 0 0 256 416" fill="none" stroke="url(#income)" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="url(#accent)"/>
  
  <!-- Subtle grid lines -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#475569" stroke-width="1" opacity="0.2"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="#475569" stroke-width="1" opacity="0.2"/>
</svg>
